name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
        pip install -r requirements.txt || echo "Some packages may fail in CI"
    
    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warning for complexity issues
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: |
        black --check --diff src/ tests/ || echo "Code formatting issues found. Run 'black src/ tests/' locally."
      continue-on-error: true
    
    - name: Check import ordering with isort
      run: |
        isort --check-only --diff src/ tests/ || echo "Import ordering issues found. Run 'isort src/ tests/' locally."
      continue-on-error: true
    
    - name: Compile Python files
      run: |
        python -m compileall src/ attack/ defense/ inference/ dataset/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint-and-compile
    strategy:
      matrix:
        python-version: ['3.10']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        # Install core dependencies only for tests
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install transformers==4.51.1 tqdm numpy
        pip install cryptography pytest-asyncio
        python -c "import transformers; print('transformers version:', transformers.__version__)"
    
    - name: Run security tests
      run: |
        pytest tests/test_security_utils.py -v --tb=short
    
    - name: Run config tests
      run: |
        pytest tests/test_config.py -v --tb=short
    
    - name: Run AES tests
      run: |
        pytest tests/test_aes_kvcache.py -v --tb=short
    
    - name: Generate coverage report
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=term-missing
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install bandit
      run: pip install bandit
    
    - name: Run security scan
      run: |
        bandit -r src/ attack/ defense/ inference/ dataset/ -f json -o bandit-report.json || true
        bandit -r src/ attack/ defense/ inference/ dataset/ -ll
      continue-on-error: true
